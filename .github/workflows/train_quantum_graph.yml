name: Quantum Graph Training — Baseline vs QFI (MUTAG, PROTEINS)

# Train on A6000, report on A6000:
#
#   train-baseline (A6000) ──► report-baseline (A6000)
#   train-qfi      (A6000) ──► report-qfi      (A6000)
#
# Both train --algorithm {baseline,qfi} on MUTAG + PROTEINS. A6000 cannot reach
# cml's Cloudflare-fronted asset backend, so each training job just uploads its
# artifact and the paired A6000 job regenerates the report (metrics table +
# best-fold loss/accuracy curves) and posts it under its own watermark.

on:
  push:
    branches: [feat/torch_qdrop, main]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - "scripts/generate_cml_report.py"
      - ".github/workflows/train_quantum_graph.yml"
      - ".github/workflows/_train_quantum_one.yml"
      - ".github/workflows/_report_one.yml"
  pull_request:
    branches: [feat/torch_qdrop]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - "scripts/generate_cml_report.py"
      - ".github/workflows/train_quantum_graph.yml"
      - ".github/workflows/_train_quantum_one.yml"
      - ".github/workflows/_report_one.yml"
  workflow_dispatch:
    inputs:
      epochs:
        description: "Max training epochs per fold"
        required: false
        default: "100"
      n_qubits:
        description: "Quantum tensor width override: 8 or 16"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  train-baseline:
    name: Train baseline — MUTAG+PROTEINS (A6000)
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: baseline
      datasets: mutag proteins
      runner-labels: '["self-hosted","A6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      post-cml-comment: false
      watermark-title: "Baseline — MUTAG+PROTEINS"
      artifact-suffix: baseline

  report-baseline:
    name: Report baseline (A6000)
    needs: train-baseline
    if: always() && needs.train-baseline.result == 'success'
    uses: ./.github/workflows/_report_one.yml
    secrets: inherit
    with:
      artifact-suffix: baseline
      watermark-title: "Baseline — MUTAG+PROTEINS"
      algorithm: baseline

  train-qfi:
    name: Train QFI — MUTAG+PROTEINS (A6000)
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: qfi
      datasets: mutag proteins
      runner-labels: '["self-hosted","A6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      post-cml-comment: false
      watermark-title: "QFI-Drop — MUTAG+PROTEINS"
      artifact-suffix: qfi

  report-qfi:
    name: Report QFI (A6000)
    needs: train-qfi
    if: always() && needs.train-qfi.result == 'success'
    uses: ./.github/workflows/_report_one.yml
    secrets: inherit
    with:
      artifact-suffix: qfi
      watermark-title: "QFI-Drop — MUTAG+PROTEINS"
      algorithm: qfi
