name: Quantum Graph Training — MUTAG & PROTEINS

# Orchestration plan:
#
#   train-pruning   (A6000)  ──┐
#                              ├──► train-both   (A6000, algorithm=both)
#   train-dropout   (P6000)  ──┤
#         │                     │
#         └──► report-dropout (A6000, posts CML comment for the P6000 run)
#
# CML asset uploads currently fail from the P6000 runner (Cloudflare 400 on
# the cml.dev upload endpoint), so the dropout report is generated on a
# downstream A6000 job that pulls the P6000 training artifact and posts
# the comment from a machine whose CML endpoint works.
#
# Each algorithm uses its own sticky CML comment so the three reports
# (pruning / dropout / both) appear as three independent rolling updates
# rather than overwriting each other.

on:
  push:
    branches: [feat/torch_qdrop]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - "scripts/generate_cml_report.py"
      - ".github/workflows/train_quantum_graph.yml"
      - ".github/workflows/_train_quantum_one.yml"
  pull_request:
    branches: [feat/torch_qdrop]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - "scripts/generate_cml_report.py"
      - ".github/workflows/train_quantum_graph.yml"
      - ".github/workflows/_train_quantum_one.yml"
  workflow_dispatch:
    inputs:
      epochs:
        description: "Max training epochs per fold"
        required: false
        default: "100"
      n_qubits:
        description: "Quantum tensor width override: 8 or 16"
        required: false
        default: "16"

# Reusable workflow jobs inherit the caller's permissions, capped at the
# caller's grant. The default caller-grant for reusable workflows is
# read-only, which collides with the nested job that needs
# ``contents: write`` (baseline updates) and ``pull-requests: write``
# (CML comment posting). Granting them here propagates the same level
# into the reusable workflow.
permissions:
  contents: write
  pull-requests: write

jobs:
  train-pruning:
    name: Train (pruning, A6000)
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: pruning
      runner-labels: '["self-hosted","A6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      post-cml-comment: true
      watermark-title: "Q-Drop training — pruning"
      artifact-suffix: pruning

  train-dropout:
    name: Train (dropout, P6000)
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: dropout
      runner-labels: '["self-hosted","P6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      # P6000 cannot reach CML's asset upload backend — skip the post here
      # and let `report-dropout` handle it from the A6000 instead.
      post-cml-comment: false
      watermark-title: "Q-Drop training — dropout"
      artifact-suffix: dropout

  report-dropout:
    name: Report (dropout, A6000)
    needs: train-dropout
    runs-on: [self-hosted, A6000]
    if: always() && needs.train-dropout.result == 'success'
    permissions:
      # On `push` events CML targets commit comments
      # (`POST /repos/{owner}/{repo}/commits/{sha}/comments`),
      # which needs write-level contents scope.
      contents: write
      pull-requests: write
    env:
      ALGORITHM: dropout
      WATERMARK_TITLE: "Q-Drop training — dropout"
      OUTPUT_DIR: ci_results
      MPLCONFIGDIR: /tmp/matplotlib
    steps:
      - name: Add npm global bin to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install report-only deps
        run: |
          # The dropout report only re-renders charts + Markdown from the
          # uploaded summary.json. We do not need torch / pyg / pennylane
          # here, just the plotting + JSON stack.
          pip install --upgrade pip
          pip install "matplotlib>=3.7.0" "numpy>=1.24.0"

      - name: Download dropout training artifact
        uses: actions/download-artifact@v4
        with:
          name: quantum-graph-metrics-dropout-${{ github.run_id }}
          path: artifact-dropout

      - name: Stage results for the report script
        id: stage
        run: |
          # The artifact preserves the original ``ci_results/quantum_graph_*``
          # path tree, but only the bits we explicitly uploaded. Mirror it
          # back into the workspace so generate_cml_report.py sees the same
          # ``RESULTS_DIR`` layout it would on the training runner.
          mkdir -p "$OUTPUT_DIR"
          if [ -d artifact-dropout/ci_results ]; then
            cp -r artifact-dropout/ci_results/* "$OUTPUT_DIR"/
          else
            cp -r artifact-dropout/* "$OUTPUT_DIR"/ 2>/dev/null || true
          fi
          RESULTS_DIR=$(ls -dt "$OUTPUT_DIR"/quantum_graph_training_* 2>/dev/null | head -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "ERROR: dropout artifact did not contain a quantum_graph_training_* directory"
            ls -R artifact-dropout
            exit 1
          fi
          echo "RESULTS_DIR=$RESULTS_DIR" >> "$GITHUB_ENV"
          echo "results-dir=$RESULTS_DIR" >> "$GITHUB_OUTPUT"
          ls -lah "$RESULTS_DIR"

      - name: Generate CML report (dropout)
        env:
          REPORT_INCLUDE_INLINE_ASSETS: "true"
          REPORT_PATH: report.md
          BASELINE_PATH: quantum_graph_baseline.json
        run: |
          python scripts/generate_cml_report.py

      - name: Post / update CML comment (dropout)
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml ci
          cml comment update --watermark-title="$WATERMARK_TITLE" report.md

      - name: Re-upload dropout report (with charts regenerated on A6000)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quantum-graph-metrics-dropout-final-${{ github.run_id }}
          path: |
            ${{ steps.stage.outputs.results-dir }}/summary.json
            ${{ steps.stage.outputs.results-dir }}/report_assets/*.png
            report.md
          retention-days: 30
          if-no-files-found: warn

  train-both:
    name: Train (both, A6000)
    needs: [train-pruning, train-dropout]
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: both
      runner-labels: '["self-hosted","A6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      post-cml-comment: true
      watermark-title: "Q-Drop training — both"
      artifact-suffix: both
