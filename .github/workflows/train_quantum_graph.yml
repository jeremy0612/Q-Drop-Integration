name: Quantum Graph Training — MUTAG & PROTEINS

on:
  push:
    branches: [feat/torch_qdrop]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - ".github/workflows/train_quantum_graph.yml"
  pull_request:
    branches: [feat/torch_qdrop]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - ".github/workflows/train_quantum_graph.yml"
  workflow_dispatch:
    inputs:
      algorithm:
        description: "Q-Drop mode: baseline | pruning | dropout | both"
        required: false
        default: "baseline"
      epochs:
        description: "Max training epochs per fold"
        required: false
        default: "100"
      n_qubits:
        description: "Quantum tensor width override: 8 or 16"
        required: false
        default: "16"

jobs:
  train:
    runs-on: [P6000]
    permissions:
      contents: write
      pull-requests: write

    env:
      TORCH_VERSION: "2.7.0"
      CUDA_TAG: "cu128"
      OUTPUT_DIR: ci_results

    steps:
      - name: Add npm global bin to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: System info
        run: |
          echo "=== System ==="
          uname -a
          nvidia-smi || echo "No GPU detected"
          echo "CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-all}"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

    #   - name: Install CML
    #     run: |
    #       npm install -g @dvcorg/cml

      - name: Check existing dependency stack
        id: dep_check
        run: |
          # Self-hosted runners keep site-packages across jobs. pip treats
          # 2.7.0+cu126 and 2.7.0+cu128 as both satisfying "torch==2.7.0"
          # (local version segment ignored), so without an explicit check
          # the old cu126 wheel can survive and Blackwell sm_120 stays unsupported.
          #
          # This step probes the installed stack and emits per-component flags.
          # Subsequent install steps gate on those flags so a warm runner skips
          # the slow force-reinstall path entirely.
          set +e
          python - <<'PYEOF' > /tmp/dep_check.env
          import warnings

          def vtuple(s):
              # "2.7.0+cu128" -> (2, 7, 0); "0.6.12" -> (0, 6, 12)
              head = s.split("+", 1)[0]
              parts = []
              for p in head.split("."):
                  digits = "".join(c for c in p if c.isdigit())
                  if not digits:
                      break
                  parts.append(int(digits))
              return tuple(parts)

          want_torch_str = "2.7.0+cu128"
          flags = {"torch": "reinstall", "pyg": "reinstall",
                   "pennylane": "reinstall", "training": "reinstall"}

          # torch: full local version match + sm_120 cubin present
          try:
              import torch
              archs = torch.cuda.get_arch_list()
              has_arch = "sm_120" in archs or "compute_120" in archs
              if torch.__version__ == want_torch_str and has_arch:
                  flags["torch"] = "ok"
          except Exception:
              pass

          # PyG: import clean of "undefined symbol" ABI warnings
          try:
              with warnings.catch_warnings(record=True) as caught:
                  warnings.simplefilter("always")
                  import torch_geometric  # noqa: F401
              abi_break = any("undefined symbol" in str(w.message) for w in caught)
              if not abi_break:
                  flags["pyg"] = "ok"
          except Exception:
              pass

          # PennyLane 0.38.x + autoray < 0.7
          try:
              import pennylane, autoray
              if pennylane.__version__.startswith("0.38") and \
                 vtuple(autoray.__version__) < (0, 7):
                  flags["pennylane"] = "ok"
          except Exception:
              pass

          # Training deps: importable + above version floor
          try:
              import sklearn, numpy, datasets
              import matplotlib, tqdm  # noqa: F401
              if vtuple(sklearn.__version__) >= (1, 3, 0) and \
                 vtuple(numpy.__version__) >= (1, 24, 0) and \
                 vtuple(datasets.__version__) >= (2, 18, 0):
                  flags["training"] = "ok"
          except Exception:
              pass

          for k, v in flags.items():
              print(f"{k}={v}")
          PYEOF
          cat /tmp/dep_check.env
          cat /tmp/dep_check.env >> "$GITHUB_OUTPUT"

      - name: Wipe stale torch stack (only if mismatch)
        if: steps.dep_check.outputs.torch != 'ok' || steps.dep_check.outputs.pyg != 'ok'
        run: |
          pip cache purge || true
          pip uninstall -y \
            torch torchvision torchaudio \
            torch-geometric pyg_lib torch_scatter torch_sparse \
            torch_cluster torch_spline_conv || true

      - name: Install PyTorch (CUDA 12.8, Blackwell sm_120)
        if: steps.dep_check.outputs.torch != 'ok'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --force-reinstall --no-cache-dir \
            torch==2.7.0 \
            --index-url https://download.pytorch.org/whl/cu128

      - name: Install PyTorch Geometric
        if: steps.dep_check.outputs.pyg != 'ok' || steps.dep_check.outputs.torch != 'ok'
        run: |
          # Native ext wheels often lag behind torch+cu128. Try first, accept fallback.
          pip install --force-reinstall --no-cache-dir \
            pyg_lib \
            torch_scatter \
            torch_sparse \
            torch_cluster \
            torch_spline_conv \
            -f https://data.pyg.org/whl/torch-2.7.0+cu128.html || \
            echo "PyG native ext wheels not available for torch-2.7.0+cu128, skipping"
          pip install --force-reinstall --no-cache-dir torch-geometric

      - name: Install PennyLane stack
        if: steps.dep_check.outputs.pennylane != 'ok' || steps.dep_check.outputs.torch != 'ok'
        run: |
          pip install --force-reinstall --no-cache-dir \
            "autoray<0.7" \
            "pennylane==0.38.0" \
            "pennylane-lightning==0.38.0"

      - name: Install training dependencies
        if: steps.dep_check.outputs.training != 'ok'
        run: |
          pip install \
            "scikit-learn>=1.3.0" \
            "numpy>=1.24.0" \
            "matplotlib>=3.7.0" \
            "tqdm>=4.66.0" \
            "datasets>=2.18.0"

      - name: Verify environment
        run: |
          python - << 'PYEOF'
          import torch, torch_geometric, pennylane, sklearn, numpy, datasets
          print(f"PyTorch:        {torch.__version__}")
          print(f"CUDA available: {torch.cuda.is_available()}")
          print(f"CUDA build:     {torch.version.cuda}")
          arch_list = torch.cuda.get_arch_list()
          print(f"Arch list:      {arch_list}")
          if torch.cuda.is_available():
              print(f"GPU:            {torch.cuda.get_device_name(0)}")
              props = torch.cuda.get_device_properties(0)
              print(f"VRAM:           {props.total_memory / 1e9:.1f} GB")
              gpu_sm = f"sm_{props.major}{props.minor}"
              print(f"Compute cap:    {gpu_sm}")
              if gpu_sm not in arch_list and f"compute_{props.major}{props.minor}" not in arch_list:
                  raise SystemExit(
                      f"FATAL: torch wheel missing {gpu_sm} cubins; "
                      f"installed arches {arch_list}. Bump CUDA_TAG or use nightly."
                  )
              probe = torch.zeros(4, device="cuda") + 1.0
              print(f"Kernel probe:   {probe.sum().item():.1f}")
          print(f"PyG:            {torch_geometric.__version__}")
          print(f"PennyLane:      {pennylane.__version__}")
          print(f"scikit-learn:   {sklearn.__version__}")
          print(f"NumPy:          {numpy.__version__}")
          print(f"HF datasets:    {datasets.__version__}")
          PYEOF

      - name: Run training — MUTAG & PROTEINS
        env:
          ALGORITHM: ${{ github.event.inputs.algorithm || 'pruning' }}
          EPOCHS: ${{ github.event.inputs.epochs || '100' }}
          N_QUBITS: ${{ github.event.inputs.n_qubits || '' }}

        run: |
          echo "Q-Drop algorithm : $ALGORITHM"
          echo "Max epochs       : $EPOCHS"
          if [ -n "$N_QUBITS" ]; then
            echo "Quantum width    : $N_QUBITS"
            python src/train_quantum_models.py \
              --datasets mutag proteins \
              --epochs "$EPOCHS" \
              --algorithm "$ALGORITHM" \
              --n-qubits "$N_QUBITS" \
              --batch-size 32 \
              --prune-window 4 \
              --output-dir "$OUTPUT_DIR" \
              --seed 42
          else
            python src/train_quantum_models.py \
              --datasets mutag proteins \
              --epochs "$EPOCHS" \
              --algorithm "$ALGORITHM" \
              --output-dir "$OUTPUT_DIR" \
              --seed 42
          fi
          echo "ALGORITHM=$ALGORITHM" >> $GITHUB_ENV

      - name: Locate results directory
        run: |
          RESULTS_DIR=$(ls -dt "$OUTPUT_DIR"/quantum_graph_training_* 2>/dev/null | head -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "ERROR: no training output found under $OUTPUT_DIR"
            exit 1
          fi
          echo "RESULTS_DIR=$RESULTS_DIR" >> $GITHUB_ENV
          echo "Results at: $RESULTS_DIR"
          ls -lah "$RESULTS_DIR"

      - name: Generate CML report
        env:
          MPLCONFIGDIR: /tmp/matplotlib
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml ci

          python - << 'PYEOF'
          import json
          import math
          import os
          from pathlib import Path

          import matplotlib.pyplot as plt
          import numpy as np

          results_dir = Path(os.environ["RESULTS_DIR"])
          assets_dir = results_dir / "report_assets"
          assets_dir.mkdir(parents=True, exist_ok=True)
          algorithm = os.environ.get("ALGORITHM", "baseline")
          ref = os.environ.get("GITHUB_REF_NAME", "unknown")
          sha = os.environ.get("GITHUB_SHA", "")[:8]
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          workflow_name = os.environ.get("GITHUB_WORKFLOW", "unknown")

          with open(results_dir / "summary.json", encoding="utf-8") as summary_file:
              summary = json.load(summary_file)

          metrics = ["accuracy", "precision", "recall", "f1", "roc_auc", "pr_auc"]
          primary_metrics = ["accuracy", "f1", "roc_auc", "pr_auc"]
          preferred_dataset_order = ["mutag", "proteins"]
          ordered_keys = [key for key in preferred_dataset_order if key in summary] + [
              key for key in summary if key not in preferred_dataset_order
          ]
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else "#"

          def format_scalar(value):
              if value is None:
                  return "—"
              if isinstance(value, bool):
                  return "Yes" if value else "No"
              if isinstance(value, float):
                  if math.isnan(value) or math.isinf(value):
                      return "—"
                  return f"{value:.4f}"
              return str(value)

          def format_mean_std(mean_value, std_value):
              if mean_value is None or std_value is None:
                  return "—"
              if any(math.isnan(v) or math.isinf(v) for v in (mean_value, std_value)):
                  return "—"
              return f"{mean_value:.4f} +/- {std_value:.4f}"

          def select_best_fold(result):
              folds = result.get("folds", [])
              if not folds:
                  return None
              return max(folds, key=lambda fold: fold.get("accuracy", 0.0))

          overview_chart = assets_dir / "quantum_graph_overview.png"
          curve_chart = assets_dir / "quantum_graph_learning_curves.png"
          qdrop_chart = assets_dir / "quantum_graph_qdrop_progress.png"

          if ordered_keys:
              metric_labels = ["Accuracy", "F1", "ROC AUC", "PR AUC"]
              x_positions = np.arange(len(metric_labels))
              bar_width = 0.35 if len(ordered_keys) > 1 else 0.55
              colors = ["#2E86AB", "#F18F01", "#C73E1D", "#3B8B5A"]

              figure, axis = plt.subplots(figsize=(12, 6))
              for index, dataset_key in enumerate(ordered_keys):
                  result = summary[dataset_key]
                  stats = result.get("summary", {})
                  means = [stats.get(f"mean_{metric}", 0.0) for metric in primary_metrics]
                  stds = [stats.get(f"std_{metric}", 0.0) for metric in primary_metrics]
                  offset = (index - (len(ordered_keys) - 1) / 2) * bar_width
                  axis.bar(
                      x_positions + offset,
                      means,
                      width=bar_width,
                      yerr=stds,
                      capsize=4,
                      label=result.get("dataset", dataset_key.upper()),
                      color=colors[index % len(colors)],
                      alpha=0.92,
                  )

              axis.set_title("Cross-Dataset Performance Overview", fontsize=14, weight="bold")
              axis.set_xticks(x_positions)
              axis.set_xticklabels(metric_labels)
              axis.set_ylabel("Score")
              axis.set_ylim(0.0, 1.05)
              axis.grid(axis="y", linestyle="--", alpha=0.3)
              axis.legend(frameon=False)
              figure.tight_layout()
              figure.savefig(overview_chart, dpi=200, bbox_inches="tight")
              plt.close(figure)

              figure, axes = plt.subplots(
                  len(ordered_keys),
                  2,
                  figsize=(14, 5 * max(len(ordered_keys), 1)),
                  squeeze=False,
              )
              for row_index, dataset_key in enumerate(ordered_keys):
                  result = summary[dataset_key]
                  dataset_label = result.get("dataset", dataset_key.upper())
                  best_fold = select_best_fold(result)
                  loss_axis = axes[row_index][0]
                  score_axis = axes[row_index][1]

                  if best_fold is None:
                      loss_axis.set_axis_off()
                      score_axis.set_axis_off()
                      continue

                  train_curve = best_fold.get("train_curve", [])
                  val_curve = best_fold.get("val_curve", [])
                  train_epochs = [point["epoch"] for point in train_curve]
                  val_epochs = [point["epoch"] for point in val_curve]

                  if train_curve:
                      loss_axis.plot(
                          train_epochs,
                          [point.get("loss", 0.0) for point in train_curve],
                          label="Train Loss",
                          color="#2E86AB",
                          linewidth=2,
                      )
                  if val_curve:
                      loss_axis.plot(
                          val_epochs,
                          [point.get("loss", 0.0) for point in val_curve],
                          label="Val Loss",
                          color="#C73E1D",
                          linewidth=2,
                      )
                  loss_axis.set_title(
                      f"{dataset_label} Best Fold #{best_fold['fold']} Loss",
                      fontsize=12,
                      weight="bold",
                  )
                  loss_axis.set_xlabel("Epoch")
                  loss_axis.set_ylabel("Loss")
                  loss_axis.grid(alpha=0.3, linestyle="--")
                  loss_axis.legend(frameon=False)

                  if train_curve:
                      score_axis.plot(
                          train_epochs,
                          [point.get("accuracy", 0.0) for point in train_curve],
                          label="Train Acc",
                          color="#2E86AB",
                          linewidth=2,
                      )
                  if val_curve:
                      score_axis.plot(
                          val_epochs,
                          [point.get("accuracy", 0.0) for point in val_curve],
                          label="Val Acc",
                          color="#F18F01",
                          linewidth=2,
                      )
                      score_axis.plot(
                          val_epochs,
                          [point.get("f1", 0.0) for point in val_curve],
                          label="Val F1",
                          color="#3B8B5A",
                          linewidth=2,
                      )
                  score_axis.set_title(
                      f"{dataset_label} Best Fold #{best_fold['fold']} Accuracy / F1",
                      fontsize=12,
                      weight="bold",
                  )
                  score_axis.set_xlabel("Epoch")
                  score_axis.set_ylabel("Score")
                  score_axis.set_ylim(0.0, 1.05)
                  score_axis.grid(alpha=0.3, linestyle="--")
                  score_axis.legend(frameon=False)

              figure.tight_layout()
              figure.savefig(curve_chart, dpi=200, bbox_inches="tight")
              plt.close(figure)

              if algorithm in {"pruning", "dropout", "both"}:
                  figure, axes = plt.subplots(
                      len(ordered_keys),
                      2,
                      figsize=(14, 4.5 * max(len(ordered_keys), 1)),
                      squeeze=False,
                  )
                  for row_index, dataset_key in enumerate(ordered_keys):
                      result = summary[dataset_key]
                      dataset_label = result.get("dataset", dataset_key.upper())
                      best_fold = select_best_fold(result)
                      phase_axis = axes[row_index][0]
                      drop_axis = axes[row_index][1]

                      if best_fold is None:
                          phase_axis.set_axis_off()
                          drop_axis.set_axis_off()
                          continue

                      qdrop_curve = best_fold.get("qdrop_curve", [])
                      if not qdrop_curve:
                          phase_axis.set_axis_off()
                          drop_axis.set_axis_off()
                          continue

                      qdrop_epochs = [point.get("epoch", 0) for point in qdrop_curve]
                      prune_ratio = [point.get("prune_ratio", 0.0) for point in qdrop_curve]
                      prune_steps = [point.get("pruning_step_count", 0) for point in qdrop_curve]
                      prune_phase = [point.get("is_prune_phase", 0) for point in qdrop_curve]
                      dropout_enabled = [point.get("dropout_enabled", 0) for point in qdrop_curve]
                      dropped_wire_count = [point.get("dropped_wire_count", 0) for point in qdrop_curve]
                      active_dropout_layers = [point.get("active_dropout_layers", 0) for point in qdrop_curve]

                      phase_axis.plot(
                          qdrop_epochs,
                          prune_ratio,
                          color="#2E86AB",
                          linewidth=2,
                          label="Prune Ratio",
                      )
                      phase_axis.step(
                          qdrop_epochs,
                          prune_phase,
                          where="mid",
                          color="#C73E1D",
                          linewidth=2,
                          label="Prune Phase",
                      )
                      phase_axis.plot(
                          qdrop_epochs,
                          prune_steps,
                          color="#3B8B5A",
                          linewidth=2,
                          label="Pruning Steps",
                      )
                      phase_axis.set_title(
                          f"{dataset_label} Best Fold #{best_fold['fold']} Pruning Progress",
                          fontsize=12,
                          weight="bold",
                      )
                      phase_axis.set_xlabel("Epoch")
                      phase_axis.set_ylabel("Value")
                      phase_axis.grid(alpha=0.3, linestyle="--")
                      phase_axis.legend(frameon=False)

                      drop_axis.step(
                          qdrop_epochs,
                          dropout_enabled,
                          where="mid",
                          color="#F18F01",
                          linewidth=2,
                          label="Dropout Enabled",
                      )
                      drop_axis.plot(
                          qdrop_epochs,
                          dropped_wire_count,
                          color="#7B2CBF",
                          linewidth=2,
                          label="Dropped Wires",
                      )
                      drop_axis.plot(
                          qdrop_epochs,
                          active_dropout_layers,
                          color="#00897B",
                          linewidth=2,
                          label="Active Dropout Layers",
                      )
                      drop_axis.set_title(
                          f"{dataset_label} Best Fold #{best_fold['fold']} Dropout Progress",
                          fontsize=12,
                          weight="bold",
                      )
                      drop_axis.set_xlabel("Epoch")
                      drop_axis.set_ylabel("Count / Flag")
                      drop_axis.grid(alpha=0.3, linestyle="--")
                      drop_axis.legend(frameon=False)

                  figure.tight_layout()
                  figure.savefig(qdrop_chart, dpi=200, bbox_inches="tight")
                  plt.close(figure)

          lines = [
              "# Quantum Graph Training Report — MUTAG & PROTEINS",
              "",
              f"**Branch:** `{ref}` | **Commit:** `{sha}` | **Run:** [{run_id}]({run_url})",
              f"**Algorithm:** `{algorithm}` | **Model:** QGCN",
              "",
              "## Run Overview",
              "",
              "| Property | Value |",
              "|----------|-------|",
              f"| Workflow | `{workflow_name}` |",
              f"| Branch | `{ref}` |",
              f"| Commit | `{sha}` |",
              f"| Run | [{run_id}]({run_url}) |",
              f"| Algorithm | `{algorithm}` |",
              f"| Model | `QGCN` |",
              f"| Datasets | {', '.join(summary[key].get('dataset', key.upper()) for key in ordered_keys)} |",
              "",
              "## Dataset Overview",
              "",
              "| Dataset | Source | Graphs | Classes | Node Feature Dim | Task |",
              "|---------|--------|-------:|--------:|-----------------:|------|",
          ]

          for dataset_key in ordered_keys:
              result = summary[dataset_key]
              source = result.get("dataset_source", "—")
              source_url = f"https://huggingface.co/datasets/{source}" if source != "—" else "#"
              lines.append(
                  f"| {result.get('dataset', dataset_key.upper())} | [{source}]({source_url}) | "
                  f"{result.get('n_graphs', '—')} | {result.get('n_classes', '—')} | "
                  f"{result.get('node_feature_dim', '—')} | {result.get('task', '—')} |"
              )

          reference_config = summary[ordered_keys[0]].get("config", {}) if ordered_keys else {}
          config_rows = [
              ("Epochs", reference_config.get("epochs")),
              ("Learning rate", reference_config.get("lr")),
              ("Weight decay", reference_config.get("weight_decay")),
              ("Batch size", reference_config.get("batch_size")),
              ("Q-depths", reference_config.get("q_depths")),
              ("Quantum width", reference_config.get("n_qubits")),
              ("Folds", reference_config.get("n_folds")),
              ("Early stop patience", reference_config.get("early_stop_patience")),
              ("Validation frequency", reference_config.get("val_frequency")),
              ("Gradient clip", reference_config.get("grad_clip")),
              ("LR scheduler", reference_config.get("use_scheduler")),
              ("Class weights", reference_config.get("use_class_weights")),
              ("Q-Drop schedule", reference_config.get("qdrop_schedule")),
              ("Dropout probability", reference_config.get("dropout_prob")),
              ("Dropped wires / layer", reference_config.get("n_drop_wires")),
              ("Forward output masking", reference_config.get("enable_forward_mask")),
              ("Seed", reference_config.get("seed")),
          ]
          if algorithm in {"pruning", "both"}:
              config_rows.extend(
                  [
                      ("Accumulate window", reference_config.get("accumulate_window")),
                      ("Prune window", reference_config.get("prune_window")),
                      ("Prune ratio", reference_config.get("prune_ratio")),
                  ]
              )

          lines += [
              "",
              "## Shared Training Configuration",
              "",
              "| Parameter | Value |",
              "|-----------|-------|",
          ]
          for label, value in config_rows:
              lines.append(f"| {label} | {format_scalar(value)} |")

          lines += [
              "",
              "## Aggregate Results",
              "",
              "| Dataset | Accuracy | F1 | ROC AUC | PR AUC | Precision | Recall |",
              "|---------|----------|----|---------|--------|-----------|--------|",
          ]
          for dataset_key in ordered_keys:
              result = summary[dataset_key]
              stats = result.get("summary", {})
              lines.append(
                  f"| {result.get('dataset', dataset_key.upper())} | "
                  f"{format_mean_std(stats.get('mean_accuracy'), stats.get('std_accuracy'))} | "
                  f"{format_mean_std(stats.get('mean_f1'), stats.get('std_f1'))} | "
                  f"{format_mean_std(stats.get('mean_roc_auc'), stats.get('std_roc_auc'))} | "
                  f"{format_mean_std(stats.get('mean_pr_auc'), stats.get('std_pr_auc'))} | "
                  f"{format_mean_std(stats.get('mean_precision'), stats.get('std_precision'))} | "
                  f"{format_mean_std(stats.get('mean_recall'), stats.get('std_recall'))} |"
              )

          for dataset_key in ordered_keys:
              result = summary[dataset_key]
              dataset = result.get("dataset", dataset_key.upper())
              cfg = result.get("config", {})
              stats = result.get("summary", {})
              folds = result.get("folds", [])
              best_fold = select_best_fold(result)

              lines += [
                  "",
                  f"## {dataset}",
                  "",
                  "### Configuration",
                  "",
                  "| Parameter | Value |",
                  "|-----------|-------|",
                  f"| Epochs | {format_scalar(cfg.get('epochs'))} |",
                  f"| Learning rate | {format_scalar(cfg.get('lr'))} |",
                  f"| Weight decay | {format_scalar(cfg.get('weight_decay'))} |",
                  f"| Batch size | {format_scalar(cfg.get('batch_size'))} |",
                  f"| Q-depths | {format_scalar(cfg.get('q_depths'))} |",
                  f"| Quantum width | {format_scalar(cfg.get('n_qubits'))} |",
                  f"| Folds | {format_scalar(cfg.get('n_folds'))} |",
                  f"| Early stop patience | {format_scalar(cfg.get('early_stop_patience'))} |",
                  f"| Validation frequency | {format_scalar(cfg.get('val_frequency'))} |",
                  f"| Gradient clip | {format_scalar(cfg.get('grad_clip'))} |",
                  f"| LR scheduler | {format_scalar(cfg.get('use_scheduler'))} |",
                  f"| Class weights | {format_scalar(cfg.get('use_class_weights'))} |",
                  f"| Seed | {format_scalar(cfg.get('seed'))} |",
                  "",
                  "### Aggregate Results",
                  "",
                  "| Metric | Mean | Std |",
                  "|--------|------|-----|",
              ]
              for metric in metrics:
                  lines.append(
                      f"| {metric.upper()} | "
                      f"{format_scalar(stats.get(f'mean_{metric}'))} | "
                      f"{format_scalar(stats.get(f'std_{metric}'))} |"
                  )

              if best_fold is not None:
                  lines += [
                      "",
                      "### Best Fold Snapshot",
                      "",
                      "| Fold | Test Loss | Accuracy | F1 | Precision | Recall | ROC AUC | PR AUC |",
                      "|------|-----------|----------|----|-----------|--------|---------|--------|",
                      f"| {best_fold.get('fold', '—')} | {format_scalar(best_fold.get('test_loss'))} | "
                      f"{format_scalar(best_fold.get('accuracy'))} | {format_scalar(best_fold.get('f1'))} | "
                      f"{format_scalar(best_fold.get('precision'))} | {format_scalar(best_fold.get('recall'))} | "
                      f"{format_scalar(best_fold.get('roc_auc'))} | {format_scalar(best_fold.get('pr_auc'))} |",
                  ]

              lines += [
                  "",
                  "### Per-Fold Results",
                  "",
                  "| Fold | Test Loss | " + " | ".join(metric.upper() for metric in metrics) + " |",
                  "|" + " --- |" * (len(metrics) + 2),
              ]
              for fold in folds:
                  fold_values = " | ".join(format_scalar(fold.get(metric)) for metric in metrics)
                  lines.append(
                      f"| {fold['fold']} | {format_scalar(fold.get('test_loss'))} | {fold_values} |"
                  )

          baseline_path = Path("quantum_graph_baseline.json")
          if baseline_path.exists():
              with open(baseline_path, encoding="utf-8") as baseline_file:
                  baseline = json.load(baseline_file)
              lines += [
                  "",
                  "## Baseline Comparison",
                  "",
                  "| Dataset | Metric | Baseline | Current | Delta | Status |",
                  "|---------|--------|----------|---------|-------|--------|",
              ]
              for dataset_key in ordered_keys:
                  current_stats = summary[dataset_key].get("summary", {})
                  baseline_stats = baseline.get(dataset_key, {}).get("summary", {})
                  dataset = summary[dataset_key].get("dataset", dataset_key.upper())
                  for metric in ["accuracy", "f1", "roc_auc", "pr_auc"]:
                      current_value = current_stats.get(f"mean_{metric}", float("nan"))
                      baseline_value = baseline_stats.get(f"mean_{metric}", float("nan"))
                      delta = current_value - baseline_value
                      sign = "+" if delta >= 0 else ""
                      if delta > 0.005:
                          status = "Improved"
                      elif delta < -0.01:
                          status = "Regression"
                      else:
                          status = "Stable"
                      lines.append(
                          f"| {dataset} | {metric.upper()} | {baseline_value:.4f} | "
                          f"{current_value:.4f} | {sign}{delta:.4f} | {status} |"
                      )
          else:
              lines += [
                  "",
                  "> No baseline found; this run will become the baseline after merge to `main`.",
              ]

          # Visualization listing is appended by the surrounding shell block
          # because the chart filenames have to come from `RESULTS_DIR` after
          # the Python heredoc finishes. We deliberately do not inline any
          # chart references here so that CML never tries to auto-publish
          # local assets through its broken upload backend.

          with open("report.md", "w", encoding="utf-8") as report_file:
              report_file.write("\n".join(lines) + "\n")
          PYEOF

          # NOTE: We intentionally do not embed inline image references in the
          # comment body. CML's asset-upload backend (cml.dev) currently
          # returns HTTP 400 from Cloudflare, which crashes `cml comment
          # create` whenever it walks the markdown and tries to upload a
          # local PNG via `publishLocalFiles` -> `CML.publish`.
          #
          # Instead, list which charts were generated and link to the
          # workflow run page; the PNGs are already uploaded as a GitHub
          # Actions artifact in the next step ("Upload training artifacts").
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          chart_lines=""
          for chart in \
              "Performance Overview:quantum_graph_overview.png" \
              "Best-Fold Learning Curves:quantum_graph_learning_curves.png" \
              "Q-Drop Progress:quantum_graph_qdrop_progress.png"; do
            label="${chart%%:*}"
            filename="${chart##*:}"
            if [ -f "$RESULTS_DIR/report_assets/$filename" ]; then
              chart_lines+="- ${label} (\`${filename}\`)"$'\n'
            fi
          done

          if [ -n "$chart_lines" ]; then
            {
              echo ""
              echo "### Visualizations"
              echo ""
              echo "Generated charts (download from the [workflow artifact](${run_url})):"
              echo ""
              echo "$chart_lines"
            } >> report.md
          fi

          cml comment create report.md

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quantum-graph-metrics-${{ github.run_id }}
          path: |
            ${{ env.RESULTS_DIR }}/summary.json
            ${{ env.RESULTS_DIR }}/mutag/metrics.json
            ${{ env.RESULTS_DIR }}/proteins/metrics.json
            ${{ env.RESULTS_DIR }}/report_assets/*.png
            report.md
          retention-days: 30

      - name: Commit baseline on main push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp "$RESULTS_DIR/summary.json" quantum_graph_baseline.json
          git config user.email "ci@example.com"
          git config user.name "CI Bot"
          git add quantum_graph_baseline.json
          git commit -m "metrics: update quantum-graph baseline [skip ci]" || true
          git push origin HEAD:main || true
