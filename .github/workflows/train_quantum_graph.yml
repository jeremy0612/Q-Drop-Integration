name: Quantum Graph Training — Baseline vs QFI (MUTAG, PROTEINS)

# Two P6000 jobs, MUTAG + PROTEINS each: one --algorithm baseline, one qfi. Each
# job trains, then the reusable generates its CML report (metrics table +
# best-fold loss/accuracy curves) and posts it inline under its own watermark so
# the baseline and QFI comments stay as two independent sticky updates.

on:
  push:
    branches: [feat/torch_qdrop, main]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - "scripts/generate_cml_report.py"
      - ".github/workflows/train_quantum_graph.yml"
      - ".github/workflows/_train_quantum_one.yml"
  pull_request:
    branches: [feat/torch_qdrop]
    paths:
      - "src/models/**"
      - "src/qdrop/**"
      - "src/training/**"
      - "src/data/**"
      - "src/train_quantum_models.py"
      - "scripts/generate_cml_report.py"
      - ".github/workflows/train_quantum_graph.yml"
      - ".github/workflows/_train_quantum_one.yml"
  workflow_dispatch:
    inputs:
      epochs:
        description: "Max training epochs per fold"
        required: false
        default: "100"
      n_qubits:
        description: "Quantum tensor width override: 8 or 16"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  train-baseline:
    name: Train baseline — MUTAG+PROTEINS (P6000)
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: baseline
      datasets: mutag proteins
      runner-labels: '["self-hosted","P6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      post-cml-comment: true
      watermark-title: "Baseline — MUTAG+PROTEINS"
      artifact-suffix: baseline

  train-qfi:
    name: Train QFI — MUTAG+PROTEINS (P6000)
    uses: ./.github/workflows/_train_quantum_one.yml
    secrets: inherit
    with:
      algorithm: qfi
      datasets: mutag proteins
      runner-labels: '["self-hosted","P6000"]'
      epochs: ${{ github.event.inputs.epochs || '100' }}
      n_qubits: ${{ github.event.inputs.n_qubits || '' }}
      post-cml-comment: true
      watermark-title: "QFI-Drop — MUTAG+PROTEINS"
      artifact-suffix: qfi
