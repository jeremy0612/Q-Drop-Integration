name: _Train Quantum One (reusable)

on:
  workflow_call:
    inputs:
      algorithm:
        description: "Q-Drop algorithm: baseline | pruning | dropout | both"
        type: string
        required: true
      runner-labels:
        description: "JSON array of self-hosted runner labels"
        type: string
        required: true
      epochs:
        description: "Max training epochs per fold"
        type: string
        default: "100"
      n_qubits:
        description: "Quantum tensor width override (8 or 16)"
        type: string
        default: ""
      post-cml-comment:
        description: "Whether to post a CML comment from this job"
        type: boolean
        default: true
      watermark-title:
        description: "CML sticky-comment watermark identifying this report"
        type: string
        required: true
      artifact-suffix:
        description: "Suffix appended to the upload-artifact name"
        type: string
        required: true

jobs:
  train:
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    permissions:
      contents: write
      pull-requests: write

    env:
      TORCH_VERSION: "2.7.0"
      CUDA_TAG: "cu128"
      OUTPUT_DIR: ci_results
      ALGORITHM: ${{ inputs.algorithm }}
      EPOCHS: ${{ inputs.epochs }}
      N_QUBITS: ${{ inputs.n_qubits }}
      WATERMARK_TITLE: ${{ inputs.watermark-title }}

    steps:
      - name: Add npm global bin to PATH
        run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: System info
        run: |
          echo "=== System ==="
          uname -a
          nvidia-smi || echo "No GPU detected"
          echo "Algorithm: $ALGORITHM"
          echo "CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-all}"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check existing dependency stack
        id: dep_check
        run: |
          # Self-hosted runners keep site-packages across jobs. pip treats
          # 2.7.0+cu126 and 2.7.0+cu128 as both satisfying "torch==2.7.0"
          # (local version segment ignored), so without an explicit check
          # the old cu126 wheel can survive and Blackwell sm_120 stays unsupported.
          set +e
          python - <<'PYEOF' > /tmp/dep_check.env
          import warnings

          def vtuple(s):
              head = s.split("+", 1)[0]
              parts = []
              for p in head.split("."):
                  digits = "".join(c for c in p if c.isdigit())
                  if not digits:
                      break
                  parts.append(int(digits))
              return tuple(parts)

          want_torch_str = "2.7.0+cu128"
          flags = {"torch": "reinstall", "pyg": "reinstall",
                   "pennylane": "reinstall", "training": "reinstall"}

          try:
              import torch
              archs = torch.cuda.get_arch_list()
              has_arch = "sm_120" in archs or "compute_120" in archs
              if torch.__version__ == want_torch_str and has_arch:
                  flags["torch"] = "ok"
          except Exception:
              pass

          try:
              with warnings.catch_warnings(record=True) as caught:
                  warnings.simplefilter("always")
                  import torch_geometric  # noqa: F401
              abi_break = any("undefined symbol" in str(w.message) for w in caught)
              if not abi_break:
                  flags["pyg"] = "ok"
          except Exception:
              pass

          try:
              import pennylane, autoray
              if pennylane.__version__.startswith("0.38") and \
                 vtuple(autoray.__version__) < (0, 7):
                  flags["pennylane"] = "ok"
          except Exception:
              pass

          try:
              import sklearn, numpy, datasets
              import matplotlib, tqdm  # noqa: F401
              if vtuple(sklearn.__version__) >= (1, 3, 0) and \
                 vtuple(numpy.__version__) >= (1, 24, 0) and \
                 vtuple(datasets.__version__) >= (2, 18, 0):
                  flags["training"] = "ok"
          except Exception:
              pass

          for k, v in flags.items():
              print(f"{k}={v}")
          PYEOF
          cat /tmp/dep_check.env
          cat /tmp/dep_check.env >> "$GITHUB_OUTPUT"

      - name: Wipe stale torch stack (only if mismatch)
        if: steps.dep_check.outputs.torch != 'ok' || steps.dep_check.outputs.pyg != 'ok'
        run: |
          pip cache purge || true
          pip uninstall -y \
            torch torchvision torchaudio \
            torch-geometric pyg_lib torch_scatter torch_sparse \
            torch_cluster torch_spline_conv || true

      - name: Install PyTorch (CUDA 12.8, Blackwell sm_120)
        if: steps.dep_check.outputs.torch != 'ok'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --force-reinstall --no-cache-dir \
            torch==2.7.0 \
            --index-url https://download.pytorch.org/whl/cu128

      - name: Install PyTorch Geometric
        if: steps.dep_check.outputs.pyg != 'ok' || steps.dep_check.outputs.torch != 'ok'
        run: |
          # Native ext wheels often lag behind torch+cu128. Try first, accept fallback.
          pip install --force-reinstall --no-cache-dir \
            pyg_lib \
            torch_scatter \
            torch_sparse \
            torch_cluster \
            torch_spline_conv \
            -f https://data.pyg.org/whl/torch-2.7.0+cu128.html || \
            echo "PyG native ext wheels not available for torch-2.7.0+cu128, skipping"
          pip install --force-reinstall --no-cache-dir torch-geometric

      - name: Install PennyLane stack
        if: steps.dep_check.outputs.pennylane != 'ok' || steps.dep_check.outputs.torch != 'ok'
        run: |
          pip install --force-reinstall --no-cache-dir \
            "autoray<0.7" \
            "pennylane==0.38.0" \
            "pennylane-lightning==0.38.0"

      - name: Install training dependencies
        if: steps.dep_check.outputs.training != 'ok'
        run: |
          pip install \
            "scikit-learn>=1.3.0" \
            "numpy>=1.24.0" \
            "matplotlib>=3.7.0" \
            "tqdm>=4.66.0" \
            "datasets>=2.18.0"

      - name: Verify environment
        run: |
          python - << 'PYEOF'
          import torch, torch_geometric, pennylane, sklearn, numpy, datasets
          print(f"PyTorch:        {torch.__version__}")
          print(f"CUDA available: {torch.cuda.is_available()}")
          print(f"CUDA build:     {torch.version.cuda}")
          arch_list = torch.cuda.get_arch_list()
          print(f"Arch list:      {arch_list}")
          if torch.cuda.is_available():
              print(f"GPU:            {torch.cuda.get_device_name(0)}")
              props = torch.cuda.get_device_properties(0)
              print(f"VRAM:           {props.total_memory / 1e9:.1f} GB")
              gpu_sm = f"sm_{props.major}{props.minor}"
              print(f"Compute cap:    {gpu_sm}")
              if gpu_sm not in arch_list and f"compute_{props.major}{props.minor}" not in arch_list:
                  raise SystemExit(
                      f"FATAL: torch wheel missing {gpu_sm} cubins; "
                      f"installed arches {arch_list}. Bump CUDA_TAG or use nightly."
                  )
              probe = torch.zeros(4, device="cuda") + 1.0
              print(f"Kernel probe:   {probe.sum().item():.1f}")
          print(f"PyG:            {torch_geometric.__version__}")
          print(f"PennyLane:      {pennylane.__version__}")
          print(f"scikit-learn:   {sklearn.__version__}")
          print(f"NumPy:          {numpy.__version__}")
          print(f"HF datasets:    {datasets.__version__}")
          PYEOF

      - name: Run training — MUTAG & PROTEINS
        run: |
          echo "Q-Drop algorithm : $ALGORITHM"
          echo "Max epochs       : $EPOCHS"
          if [ -n "$N_QUBITS" ]; then
            echo "Quantum width    : $N_QUBITS"
            python src/train_quantum_models.py \
              --datasets mutag proteins \
              --epochs "$EPOCHS" \
              --algorithm "$ALGORITHM" \
              --n-qubits "$N_QUBITS" \
              --batch-size 32 \
              --prune-window 4 \
              --output-dir "$OUTPUT_DIR" \
              --seed 42
          else
            python src/train_quantum_models.py \
              --datasets mutag proteins \
              --epochs "$EPOCHS" \
              --algorithm "$ALGORITHM" \
              --output-dir "$OUTPUT_DIR" \
              --seed 42
          fi

      - name: Locate results directory
        id: locate
        run: |
          RESULTS_DIR=$(ls -dt "$OUTPUT_DIR"/quantum_graph_training_* 2>/dev/null | head -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "ERROR: no training output found under $OUTPUT_DIR"
            exit 1
          fi
          echo "RESULTS_DIR=$RESULTS_DIR" >> "$GITHUB_ENV"
          echo "results-dir=$RESULTS_DIR" >> "$GITHUB_OUTPUT"
          echo "Results at: $RESULTS_DIR"
          ls -lah "$RESULTS_DIR"

      - name: Generate CML report
        if: inputs.post-cml-comment
        env:
          MPLCONFIGDIR: /tmp/matplotlib
          REPORT_INCLUDE_INLINE_ASSETS: "true"
          REPORT_PATH: report.md
          BASELINE_PATH: quantum_graph_baseline.json
        run: |
          python scripts/generate_cml_report.py

      - name: Post / update CML comment
        if: inputs.post-cml-comment
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cml ci
          # `cml comment update` is sticky: it looks for an existing comment
          # tagged with `--watermark-title` and edits in place, otherwise it
          # creates a new one. Each algorithm uses its own watermark so the
          # pruning / dropout / both reports occupy independent comments.
          cml comment update --watermark-title="$WATERMARK_TITLE" report.md

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quantum-graph-metrics-${{ inputs.artifact-suffix }}-${{ github.run_id }}
          path: |
            ${{ steps.locate.outputs.results-dir }}/summary.json
            ${{ steps.locate.outputs.results-dir }}/mutag/metrics.json
            ${{ steps.locate.outputs.results-dir }}/proteins/metrics.json
            ${{ steps.locate.outputs.results-dir }}/report_assets/*.png
            report.md
          retention-days: 30
          if-no-files-found: warn
