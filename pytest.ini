[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    smoke: fast import + minimal-forward checks
    unit: pure-module behaviour
    pipeline: end-to-end training step
    stress: memory/cpu/gpu profiling
    slow: takes more than ~5 seconds
filterwarnings =
    ignore::DeprecationWarning:pennylane.*
    ignore::DeprecationWarning:torch_geometric.*
